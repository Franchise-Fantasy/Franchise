name: Check

# Runs the same `npm run check` that lefthook runs locally — typecheck (app +
# edge), lint, realtime-channel scanner, paired-files drift scanner, jest unit
# tests. Lefthook is bypassable with
# `--no-verify` and only runs on the dev's machine; this Action is the
# unbypassable backstop.
#
# Triggers:
#   - push to main (catches direct pushes from any machine)
#   - pull_request to main (covers branches if you ever switch from trunk-only)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight check on the same ref (typically: rapid pushes to main)
# so the latest commit is what gets reported, not the stale one mid-run.
concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      # `typecheck:edge` shells out to Deno. Must stay on the Deno 2 line:
      # supabase/functions/deno.json uses the Deno-2-only `"nodeModulesDir": "auto"`
      # string form (1.x expects a boolean) and deno.lock is lockfile v5 (1.x tops
      # out at v3). Supabase Edge Functions runtime is on Deno 2.
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache Deno modules
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ runner.os }}-${{ hashFiles('supabase/functions/deno.lock') }}
          restore-keys: |
            deno-${{ runner.os }}-

      - name: Run full check (typecheck + edge typecheck + lint + realtime + paired-files + tests)
        run: npm run check
