name: Projections — preseason snapshot

# Pre-season / draft snapshot. Fires daily through the offseason/preseason so
# the draft board absorbs injuries, trades and role changes right up to opening
# night. resolve_phase.py no-ops once the season tips off (the daily game-by-game
# job takes over then).
#
# workflow_dispatch also accepts an explicit `season` — use it to snapshot the
# CURRENT season mid-stream (e.g. 2026). That's the "what we expected before the
# season" baseline the analytics "Performance vs Expected" card compares actuals
# against; the season model ignores current-season games, so it's a true
# preseason expectation regardless of when you run it.
on:
  schedule:
    - cron: '0 12 * * *' # 12:00 UTC daily (offset from the game-by-game job)
  workflow_dispatch:
    inputs:
      season:
        description: 'Explicit season to snapshot (e.g. 2026). Blank = auto (offseason gating, targets the next season).'
        required: false
        default: ''

concurrency:
  group: projections-preseason
  cancel-in-progress: false

jobs:
  project:
    runs-on: ubuntu-latest
    env:
      PG_DSN: ${{ secrets.PG_DSN }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: projections/requirements.txt

      - name: Install dependencies
        run: pip install -r projections/requirements.txt

      - name: Resolve season phase
        id: phase
        # Assign first (not `echo "$(…)"`) so a non-zero exit from the resolver
        # — e.g. a failed DB connection — fails this step loudly instead of
        # silently emitting an empty season that breaks the next step's args.
        run: |
          if [ -n "${{ inputs.season }}" ]; then
            season="${{ inputs.season }}"   # explicit override (e.g. current season for the PvE baseline)
          else
            season="$(python projections/resolve_phase.py season)"
          fi
          echo "season=$season" >> "$GITHUB_OUTPUT"

      - name: Generate season snapshot
        if: steps.phase.outputs.season != 'SKIP' && steps.phase.outputs.season != ''
        run: python projections/franchise_project.py --sport wnba --season ${{ steps.phase.outputs.season }} --horizon season

      - name: In season — skipped
        if: steps.phase.outputs.season == 'SKIP'
        run: echo "Season already underway; the daily game-by-game job owns projections now."
