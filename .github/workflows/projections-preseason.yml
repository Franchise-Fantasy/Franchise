name: Projections — preseason snapshot

# Pre-season / draft snapshot. Fires daily through the offseason/preseason so
# the draft board absorbs injuries, trades and role changes right up to opening
# night. resolve_phase.py no-ops once the season tips off (the daily ROS job
# takes over then). Also runnable on demand via workflow_dispatch.
on:
  schedule:
    - cron: '0 12 * * *' # 12:00 UTC daily (offset from the ROS job)
  workflow_dispatch:

concurrency:
  group: projections-preseason
  cancel-in-progress: false

jobs:
  project:
    runs-on: ubuntu-latest
    env:
      PG_DSN: ${{ secrets.PG_DSN }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: projections/requirements.txt

      - name: Install dependencies
        run: pip install -r projections/requirements.txt

      - name: Resolve season phase
        id: phase
        # Assign first (not `echo "$(…)"`) so a non-zero exit from the resolver
        # — e.g. a failed DB connection — fails this step loudly instead of
        # silently emitting an empty season that breaks the next step's args.
        run: |
          season="$(python projections/resolve_phase.py season)"
          echo "season=$season" >> "$GITHUB_OUTPUT"

      - name: Generate season snapshot
        if: steps.phase.outputs.season != 'SKIP' && steps.phase.outputs.season != ''
        run: python projections/franchise_project.py --sport wnba --season ${{ steps.phase.outputs.season }} --horizon season

      - name: In season — skipped
        if: steps.phase.outputs.season == 'SKIP'
        run: echo "Season already underway; the daily ROS job owns projections now."
