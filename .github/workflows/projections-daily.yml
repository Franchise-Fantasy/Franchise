name: Projections — daily game-by-game

# In-season game-by-game (next-game) projections. Re-clusters player archetypes,
# snapshots sportsbook player props, then projects each player against their
# actual next matchup — blending the market line for pts/reb/ast/3pm. Fires daily
# after the WNBA slate settles; resolve_phase.py no-ops outside the season window
# so this never overlaps the offseason snapshot job.
on:
  schedule:
    - cron: '0 11 * * *' # 11:00 UTC daily
  workflow_dispatch:

concurrency:
  group: projections-daily
  cancel-in-progress: false

jobs:
  project:
    runs-on: ubuntu-latest
    env:
      PG_DSN: ${{ secrets.PG_DSN }}
      BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: projections/requirements.txt

      - name: Install dependencies
        run: pip install -r projections/requirements.txt

      - name: Resolve season phase
        id: phase
        # Assign first (not `echo "$(…)"`) so a non-zero exit from the resolver
        # — e.g. a failed DB connection — fails this step loudly instead of
        # silently emitting an empty season that breaks the next step's args.
        run: |
          season="$(python projections/resolve_phase.py next_game)"
          echo "season=$season" >> "$GITHUB_OUTPUT"

      - name: Cluster player archetypes
        if: steps.phase.outputs.season != 'SKIP' && steps.phase.outputs.season != ''
        run: python projections/franchise_archetype.py --sport wnba --season ${{ steps.phase.outputs.season }}

      - name: Snapshot player props (Vegas lines)
        if: steps.phase.outputs.season != 'SKIP' && steps.phase.outputs.season != ''
        run: python projections/franchise_props.py --sport wnba --season ${{ steps.phase.outputs.season }}

      - name: Generate game-by-game projections
        if: steps.phase.outputs.season != 'SKIP' && steps.phase.outputs.season != ''
        run: python projections/franchise_project.py --sport wnba --season ${{ steps.phase.outputs.season }} --horizon next_game

      - name: Out of season — skipped
        if: steps.phase.outputs.season == 'SKIP'
        run: echo "Not within the WNBA season window; nothing to project."
