name: Projections — daily ROS

# In-season rest-of-season projections. Fires daily after the WNBA slate
# settles; resolve_phase.py no-ops outside the season window so this never
# overlaps the offseason snapshot job.
on:
  schedule:
    - cron: '0 11 * * *' # 11:00 UTC daily
  workflow_dispatch:

concurrency:
  group: projections-daily
  cancel-in-progress: false

jobs:
  project:
    runs-on: ubuntu-latest
    env:
      PG_DSN: ${{ secrets.PG_DSN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: projections/requirements.txt

      - name: Install dependencies
        run: pip install -r projections/requirements.txt

      - name: Resolve season phase
        id: phase
        run: echo "season=$(python projections/resolve_phase.py ros)" >> "$GITHUB_OUTPUT"

      - name: Generate ROS projections
        if: steps.phase.outputs.season != 'SKIP'
        run: python projections/franchise_project.py --sport wnba --season ${{ steps.phase.outputs.season }} --horizon ros

      - name: Out of season — skipped
        if: steps.phase.outputs.season == 'SKIP'
        run: echo "Not within the WNBA season window; nothing to project."
